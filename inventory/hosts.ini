# Fleet of KVM hypervisors. Each entry is a bare-metal machine (or nested
# VM) managed over SSH. What runs on it — libvirt networks, base images,
# VMs — is declared in host_vars/<name>.yml, not here.
#
# This is a generic placeholder example. For your real fleet, copy this
# pattern into hosts.local.ini (gitignored) and run playbooks with
# -i inventory/hosts.local.ini instead — see README.
[hypervisors]
hypervisor1   ansible_host=hypervisor1.example.com ansible_user=admin

# Add more hypervisors to the fleet with additional lines:
# hypervisor2 ansible_host=hypervisor2.example.com ansible_user=admin
