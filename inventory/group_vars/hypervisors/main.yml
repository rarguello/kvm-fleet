---
# Defaults shared by every hypervisor in the fleet. What's specific to one
# hypervisor (which networks/images/VMs it should have) goes in
# host_vars/<hypervisor-name>.yml — see host_vars/hypervisor1.yml for an example.
#
# The known base image catalog (Rocky/CentOS Stream) ships as a default of
# the kvm_images role — see roles/kvm_images/defaults/main.yml. Override or
# extend it here only if you need a different pinned version/checksum, or
# to add e.g. a RHEL entry pointing at your own mirror.

# cloud-init defaults (override per VM if needed).
kvm_ssh_public_key_file: "~/.ssh/id_ed25519.pub"
# The cloud-init user password lives in vault.yml, as kvm_cloud_user_password.
