---
# false: skip this role entirely (hypervisor managed elsewhere, or you just
# want a faster --tags vms/networks/images run).
kvm_hypervisor_bootstrap: true

kvm_image_dir: /var/lib/libvirt/images
kvm_pool_name: images

# Set false on image-mode/bootc hosts, where packages are already baked
# into the image and dnf/package management doesn't apply the usual way.
kvm_hypervisor_manage_packages: true

kvm_hypervisor_packages:
  - qemu-kvm
  - libvirt
  - libvirt-client
  - virt-install
  - python3-libvirt
  - python3-lxml

kvm_hypervisor_install_cockpit: false
kvm_hypervisor_cockpit_packages:
  - cockpit
  - cockpit-machines

# libguestfs (virt-cat, guestfish, virt-df, ...) for offline disk
# inspection/debugging — not required by this role itself.
kvm_hypervisor_install_libguestfs: false
kvm_hypervisor_libguestfs_packages:
  - libguestfs-tools-c

# EL9/EL10 (RHEL, Rocky, AlmaLinux, CentOS Stream) ship modular libvirt
# daemons by default. Set false for EL8 and earlier (monolithic libvirtd).
kvm_hypervisor_modular_daemons: true

kvm_hypervisor_monolithic_services:
  - libvirtd
  - libvirtd.socket

kvm_hypervisor_modular_services:
  - virtqemud.socket
  - virtqemud-ro.socket
  - virtqemud-admin.socket
  - virtnetworkd.socket
  - virtnetworkd-ro.socket
  - virtnetworkd-admin.socket
  - virtnodedevd.socket
  - virtnodedevd-ro.socket
  - virtnodedevd-admin.socket
  - virtnwfilterd.socket
  - virtnwfilterd-ro.socket
  - virtnwfilterd-admin.socket
  - virtsecretd.socket
  - virtsecretd-ro.socket
  - virtsecretd-admin.socket
  - virtstoraged.socket
  - virtstoraged-ro.socket
  - virtstoraged-admin.socket
  - virtinterfaced.socket
  - virtinterfaced-ro.socket
  - virtinterfaced-admin.socket

# Fails the play if virt-host-validate reports a hard FAIL. Disable per-host
# if you know a particular FAIL is benign.
kvm_hypervisor_require_preflight_pass: true

# Nested virtualization, off by default — enable per host in its host_vars.
kvm_hypervisor_nested_virt: false
