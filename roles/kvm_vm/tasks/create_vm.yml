---
- name: "{{ vm.name }}: check base image exists"
  ansible.builtin.stat:
    path: "{{ kvm_image_dir }}/{{ _kvm_vm_image_filename }}"
  register: _kvm_vm_base_image
  become: true

- name: "{{ vm.name }}: fail if base image is missing"
  ansible.builtin.fail:
    msg: "Base image not found: {{ kvm_image_dir }}/{{ _kvm_vm_image_filename }} (run the kvm_images role first)."
  when: not _kvm_vm_base_image.stat.exists

- name: "{{ vm.name }}: resolve disk sizes"
  ansible.builtin.set_fact:
    _kvm_vm_disks: "{{ vm.disks | default([kvm_vm_default_disk_size]) }}"
    _kvm_vm_os_disk: "{{ kvm_image_dir }}/{{ vm.name }}.qcow2"
    _kvm_vm_workdir: "/tmp/{{ vm.name }}-cloud-init"

- name: "{{ vm.name }}: query base image virtual size"
  ansible.builtin.command: "qemu-img info --output=json {{ kvm_image_dir }}/{{ _kvm_vm_image_filename }}"
  register: _kvm_vm_base_image_info
  become: true
  changed_when: false

# qemu-img create silently truncates an overlay smaller than its backing
# file's virtual size — no error, no warning — which cuts off whatever
# partition sits at the end (usually root) and leaves the guest unable to
# boot. Fail loudly instead of creating a broken VM.
- name: "{{ vm.name }}: fail if the OS disk is smaller than the base image"
  ansible.builtin.fail:
    msg: >-
      kvm_vms['{{ vm.name }}'].disks[0]='{{ _kvm_vm_disks[0] }}' is smaller than
      the base image's virtual size ({{ (_kvm_vm_base_image_info.stdout | from_json)['virtual-size'] }} bytes).
      The OS disk must be at least as large as the base image, or the overlay
      is silently truncated and the guest fails to boot.
  when: (_kvm_vm_disks[0] | human_to_bytes) < ((_kvm_vm_base_image_info.stdout | from_json)['virtual-size'] | int)

- name: "{{ vm.name }}: create OS disk (overlay on the base image)"
  ansible.builtin.command: >-
    qemu-img create -f qcow2 -F qcow2
    -b {{ kvm_image_dir }}/{{ _kvm_vm_image_filename }}
    {{ _kvm_vm_os_disk }}
    {{ _kvm_vm_disks[0] }}
  args:
    creates: "{{ _kvm_vm_os_disk }}"
  become: true

- name: "{{ vm.name }}: create extra data disks"
  ansible.builtin.command: >-
    qemu-img create -f qcow2
    {{ kvm_image_dir }}/{{ vm.name }}-disk{{ (idx + 2) | string }}.qcow2
    {{ item }}
  args:
    creates: "{{ kvm_image_dir }}/{{ vm.name }}-disk{{ (idx + 2) | string }}.qcow2"
  become: true
  loop: "{{ _kvm_vm_disks[1:] }}"
  loop_control:
    index_var: idx

- name: "{{ vm.name }}: build --disk arguments"
  ansible.builtin.set_fact:
    _kvm_vm_disk_args: ["--disk=path={{ _kvm_vm_os_disk }},format=qcow2,bus=virtio"]

- name: "{{ vm.name }}: append data disks to --disk arguments"
  ansible.builtin.set_fact:
    _kvm_vm_disk_args: >-
      {{ _kvm_vm_disk_args
         + ['--disk=path=' ~ kvm_image_dir ~ '/' ~ vm.name ~ '-disk' ~ ((idx + 2) | string) ~ '.qcow2,format=qcow2,bus=virtio'] }}
  loop: "{{ _kvm_vm_disks[1:] }}"
  loop_control:
    index_var: idx

- name: "{{ vm.name }}: create cloud-init workdir"
  ansible.builtin.file:
    path: "{{ _kvm_vm_workdir }}"
    state: directory
    mode: "0700"
  become: true

- name: "{{ vm.name }}: resolve ssh public key content (if any)"
  ansible.builtin.set_fact:
    _kvm_vm_ssh_key: "{{ lookup('file', vm.ssh_public_key_file | default(kvm_ssh_public_key_file), errors='ignore') }}"

- name: "{{ vm.name }}: fail if there's neither an ssh key nor a password"
  ansible.builtin.fail:
    msg: >-
      kvm_vms['{{ vm.name }}'] has no ssh key
      ({{ vm.ssh_public_key_file | default(kvm_ssh_public_key_file) }} not found)
      and no cloud_user_password — set at least one, or you won't be able to log in.
  when:
    - not (_kvm_vm_ssh_key | trim)
    - not (vm.cloud_user_password | default(''))

- name: "{{ vm.name }}: render cloud-init meta-data"
  ansible.builtin.template:
    src: meta-data.j2
    dest: "{{ _kvm_vm_workdir }}/meta-data"
    mode: "0600"
  become: true

- name: "{{ vm.name }}: render cloud-init user-data"
  ansible.builtin.template:
    src: user-data.j2
    dest: "{{ _kvm_vm_workdir }}/user-data"
    mode: "0600"
  become: true

- name: "{{ vm.name }}: render cloud-init network-config"
  ansible.builtin.template:
    src: network-config.j2
    dest: "{{ _kvm_vm_workdir }}/network-config"
    mode: "0600"
  become: true

- name: "{{ vm.name }}: build virt-install argv"
  ansible.builtin.set_fact:
    _kvm_vm_argv:
      - virt-install
      - "--name={{ vm.name }}"
      - "--memory={{ vm.memory_mb | default(kvm_vm_default_memory_mb) }}"
      - "--vcpus={{ vm.vcpus | default(kvm_vm_default_vcpus) }}"
      - "--cpu={{ vm.cpu_mode | default(kvm_vm_default_cpu_mode) }}"

- name: "{{ vm.name }}: append disks to virt-install argv"
  ansible.builtin.set_fact:
    _kvm_vm_argv: "{{ _kvm_vm_argv + _kvm_vm_disk_args }}"

- name: "{{ vm.name }}: complete virt-install argv"
  ansible.builtin.set_fact:
    _kvm_vm_argv: >-
      {{ _kvm_vm_argv + [
        '--os-variant=' ~ (_kvm_vm_image.os_variant | default('generic')),
        '--import',
        '--network=network=' ~ vm.network ~ ',model=virtio' ~ (',mac=' ~ vm.mac if vm.mac is defined else ''),
        '--graphics=none',
        '--console=pty,target_type=serial',
        '--virt-type=kvm',
        '--noautoconsole',
        '--cloud-init=disable=on'
          ~ ',meta-data=' ~ _kvm_vm_workdir ~ '/meta-data'
          ~ ',user-data=' ~ _kvm_vm_workdir ~ '/user-data'
          ~ ',network-config=' ~ _kvm_vm_workdir ~ '/network-config',
      ] }}

- name: "{{ vm.name }}: create the VM with virt-install"
  ansible.builtin.command:
    argv: "{{ _kvm_vm_argv }}"
  become: true
  changed_when: true

- name: "{{ vm.name }}: remove cloud-init workdir"
  ansible.builtin.file:
    path: "{{ _kvm_vm_workdir }}"
    state: absent
  become: true

- name: "{{ vm.name }}: set autostart"
  community.libvirt.virt:
    name: "{{ vm.name }}"
    autostart: "{{ vm.autostart | default(false) }}"
  become: true

- name: "{{ vm.name }}: power off if declared stopped"
  become: true
  when: (vm.state | default('present')) == 'stopped'
  block:
    - name: "{{ vm.name }}: request graceful shutdown"
      community.libvirt.virt:
        name: "{{ vm.name }}"
        state: shutdown

    # First boot can take a while (cloud-init growing the filesystem,
    # setting the hostname, network, ...) and the ACPI shutdown request
    # is lost if it arrives before the guest is ready to handle it.
    - name: "{{ vm.name }}: wait for the domain to actually shut off"
      ansible.builtin.command: "virsh domstate {{ vm.name }}"
      register: _kvm_vm_shutdown_wait
      changed_when: false
      failed_when: false
      until: _kvm_vm_shutdown_wait.stdout | trim == 'shut off'
      retries: 24
      delay: 5

    - name: "{{ vm.name }}: force off (graceful shutdown didn't take)"
      ansible.builtin.command: "virsh destroy {{ vm.name }}"
      when: _kvm_vm_shutdown_wait.stdout | trim != 'shut off'
      changed_when: true
