---
name: CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip3 install yamllint ansible-core ansible-lint

      - name: Install community.libvirt
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: yamllint
        run: yamllint -c .yamllint.yml roles/ playbooks/ inventory/ examples/ meta/ galaxy.yml

      - name: ansible-lint
        run: ansible-lint roles/ playbooks/

      - name: ansible-playbook --syntax-check
        run: ansible-playbook --syntax-check -i inventory/hosts.ini playbooks/site.yml
